<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0088cc"/>
    </linearGradient>
  </defs>

  <!-- 深黑背景圆角方形 -->
  <rect width="400" height="400" fill="#0a0a0a" rx="72"/>

  <!-- 等轴测线框立方体 -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- 外部轮廓 -->
    <polygon points="200,115 300,165 300,265 200,215" stroke="url(#grad)" stroke-width="3"/>
    <polygon points="200,115 300,165 200,215 100,165" stroke="url(#grad)" stroke-width="3"/>
    <polygon points="300,165 300,265 200,315 200,215" stroke="url(#grad)" stroke-width="3"/>

    <!-- 不可见面 -->
    <polygon points="200,215 100,165 100,265 200,315" stroke="url(#grad)" stroke-width="1.5" stroke-dasharray="6,6" opacity="0.2"/>

    <!-- 前面 2x2 分割 -->
    <line x1="200" y1="165" x2="300" y2="165" stroke="url(#grad)" stroke-width="1.5" opacity="0.3"/>
    <line x1="250" y1="140" x2="250" y2="240" stroke="url(#grad)" stroke-width="1.5" opacity="0.3"/>

    <!-- 顶面 2x2 分割 -->
    <line x1="200" y1="165" x2="100" y2="165" stroke="url(#grad)" stroke-width="1.5" opacity="0.3"/>
    <line x1="150" y1="140" x2="150" y2="240" stroke="url(#grad)" stroke-width="1.5" opacity="0.3"/>

    <!-- 右面 2x2 分割 -->
    <line x1="300" y1="215" x2="200" y2="265" stroke="url(#grad)" stroke-width="1.5" opacity="0.3"/>
    <line x1="250" y1="190" x2="250" y2="290" stroke="url(#grad)" stroke-width="1.5" opacity="0.3"/>

  </g>
</svg>
